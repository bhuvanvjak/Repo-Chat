<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GitReader</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --bg-subtle: #f6f8fa;
    --border: #d0d7de;
    --text: #1f2328;
    --text-muted: #59636e;
    --accent: #1f6feb;
    --accent-text: #ffffff;
    --user-bubble: #ddf4ff;
    --assistant-bubble: #f6f8fa;
    --error-bg: #fff1f0;
    --error-border: #ffa39e;
    --error-text: #cf222e;
    --code-bg: #eef1f4;
    --success: #1a7f37;
    --shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --bg-subtle: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #388bfd;
      --accent-text: #ffffff;
      --user-bubble: #10365e;
      --assistant-bubble: #161b22;
      --error-bg: #2d1214;
      --error-border: #6e2530;
      --error-text: #ff7b72;
      --code-bg: #1c2128;
      --success: #3fb950;
      --shadow: 0 1px 2px rgba(0,0,0,0.4);
    }
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
  }

  /* ---------- Repo bar ---------- */
  #repo-bar {
    display: flex;
    gap: 6px;
    padding: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-subtle);
  }
  #repo-input {
    flex: 1;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 12.5px;
    min-width: 0;
  }
  #repo-input:focus, #chat-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  select#model-select {
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    max-width: 92px;
  }

  button {
    padding: 7px 12px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: var(--accent);
    color: var(--accent-text);
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 500;
    white-space: nowrap;
  }
  button:hover:not(:disabled) { filter: brightness(1.08); }
  button:disabled { opacity: 0.5; cursor: default; }
  button.secondary {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  button.icon-btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 6px 8px;
  }

  #options-row {
    display: flex;
    gap: 6px;
    padding: 0 10px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-subtle);
    align-items: center;
  }

  /* ---------- Status bar ---------- */
  #status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    font-size: 11.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    min-height: 26px;
  }
  #status-bar.error { color: var(--error-text); }
  #status-bar.success { color: var(--success); }
  .spinner {
    width: 11px; height: 11px;
    border: 2px solid var(--text-muted);
    border-top-color: transparent;
    border-radius: 50%;
    display: inline-block;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Chat log ---------- */
  #chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-muted);
    max-width: 240px;
    line-height: 1.5;
  }
  #empty-state .big-icon { font-size: 28px; margin-bottom: 6px; }

  .msg-row { display: flex; flex-direction: column; max-width: 92%; }
  .msg-row.user { align-self: flex-end; align-items: flex-end; }
  .msg-row.assistant, .msg-row.error { align-self: flex-start; align-items: flex-start; }

  .msg-meta {
    font-size: 10.5px;
    color: var(--text-muted);
    margin-bottom: 3px;
    padding: 0 4px;
  }

  .bubble {
    padding: 8px 12px;
    border-radius: 12px;
    line-height: 1.5;
    box-shadow: var(--shadow);
    word-break: break-word;
  }
  .msg-row.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 3px; }
  .msg-row.assistant .bubble { background: var(--assistant-bubble); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
  .msg-row.error .bubble { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }

  .bubble p { margin: 0 0 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble h3, .bubble h4, .bubble h5, .bubble h6 { margin: 10px 0 4px; }
  .bubble ul, .bubble ol { margin: 4px 0 8px; padding-left: 20px; }
  .bubble blockquote {
    margin: 6px 0; padding: 2px 10px;
    border-left: 3px solid var(--border);
    color: var(--text-muted);
  }
  .bubble .table-wrap {
    overflow-x: auto;
    margin: 6px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .bubble table {
    border-collapse: collapse;
    width: 100%;
    font-size: 12px;
  }
  .bubble th, .bubble td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
  }
  .bubble th {
    background: var(--bg-subtle);
    font-weight: 600;
    white-space: nowrap;
  }
  .bubble tr:last-child td { border-bottom: none; }
  .bubble code {
    background: var(--code-bg);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: "SF Mono", Consolas, "Cascadia Code", monospace;
    font-size: 12px;
  }
  .bubble pre.code-block {
    position: relative;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 6px 0;
  }
  .bubble pre.code-block code {
    background: none; padding: 0;
    font-size: 12px;
    white-space: pre;
  }
  .copy-btn {
    position: absolute;
    top: 6px; right: 6px;
    padding: 2px 8px;
    font-size: 10.5px;
    background: var(--bg);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .tool-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 10px;
    margin-bottom: 4px;
    align-self: flex-start;
  }
  .tool-pill .spinner { width: 9px; height: 9px; }

  .cursor-blink::after {
    content: "▍";
    animation: blink 1s step-start infinite;
    color: var(--text-muted);
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---------- Input row ---------- */
  #chat-form {
    display: flex;
    gap: 6px;
    padding: 10px;
    border-top: 1px solid var(--border);
    background: var(--bg-subtle);
    align-items: flex-end;
  }
  #chat-input {
    flex: 1;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
  }

  #chat-log::-webkit-scrollbar { width: 8px; }
  #chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
  <div id="repo-bar">
    <input id="repo-input" type="text" placeholder="Repo path or URL (auto-filled from GitHub tab)" autocomplete="off" />
    <button id="load-btn">Load</button>
  </div>
  <div id="options-row">
    <select id="model-select" title="Chat model">
      <option value="openai/gpt-oss-20b">Fast</option>
      <option value="openai/gpt-oss-120b">Balanced</option>
      <option value="llama-3.3-70b-versatile">Deep</option>
    </select>
    <button id="clear-btn" class="secondary" type="button" title="Clear conversation">Clear chat</button>
  </div>
  <div id="status-bar">Not loaded yet.</div>
  <div id="chat-log">
    <div id="empty-state">
      <div class="big-icon">💬</div>
      Load a repo above, then ask anything — "where is auth handled", "who last touched this file", "how does X work".
    </div>
  </div>
  <form id="chat-form">
    <textarea id="chat-input" rows="1" placeholder="Ask about this repo... (Enter to send, Shift+Enter for newline)" disabled></textarea>
    <button id="send-btn" type="submit" disabled>Send</button>
  </form>
  <script src="markdown.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
